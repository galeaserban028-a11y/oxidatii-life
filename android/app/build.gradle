apply plugin: 'com.android.application'

android {
    namespace = "com.oxidatii.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.oxidatii.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode / versionName can be overridden via env for CI / re-uploads.
        // Google Play requires versionCode to strictly increase between uploads.
        def envVersionCode = System.getenv("ANDROID_VERSION_CODE")
        def envVersionName = System.getenv("ANDROID_VERSION_NAME")
        versionCode envVersionCode ? envVersionCode.toInteger() : 3
        versionName envVersionName ?: "1.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Signing config for release AAB/APK.
    // Values are read from (in order of priority):
    //   1. Environment variables: OXIDATII_KEYSTORE_PATH, OXIDATII_KEYSTORE_PASSWORD,
    //      OXIDATII_KEY_ALIAS, OXIDATII_KEY_PASSWORD
    //   2. android/keystore.properties (git-ignored) with keys:
    //      storeFile=..., storePassword=..., keyAlias=..., keyPassword=...
    // If neither is present, release builds fall back to debug signing (dev only).
    signingConfigs {
        release {
            def keystorePath = System.getenv("OXIDATII_KEYSTORE_PATH")
            def keystorePassword = System.getenv("OXIDATII_KEYSTORE_PASSWORD")
            def keyAliasEnv = System.getenv("OXIDATII_KEY_ALIAS")
            def keyPasswordEnv = System.getenv("OXIDATII_KEY_PASSWORD")

            def propsFile = rootProject.file("keystore.properties")
            if ((!keystorePath || !keystorePassword || !keyAliasEnv || !keyPasswordEnv) && propsFile.exists()) {
                def props = new Properties()
                propsFile.withInputStream { props.load(it) }
                keystorePath = keystorePath ?: props.getProperty("storeFile")
                keystorePassword = keystorePassword ?: props.getProperty("storePassword")
                keyAliasEnv = keyAliasEnv ?: props.getProperty("keyAlias")
                keyPasswordEnv = keyPasswordEnv ?: props.getProperty("keyPassword")
            }

            if (keystorePath && keystorePassword && keyAliasEnv && keyPasswordEnv) {
                // Absolute Windows paths in .properties must use / — backslash is an escape.
                // Also normalize any accidental \ so storeFile still resolves.
                keystorePath = keystorePath.replace('\\', '/')
                def kf = new File(keystorePath)
                storeFile kf.isAbsolute() ? kf : rootProject.file(keystorePath)
                storePassword keystorePassword
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
                logger.lifecycle("[oxidatii] Release signing: ${storeFile.absolutePath} alias=${keyAliasEnv}")
            } else {
                logger.warn("[oxidatii] Release signing not configured. Set OXIDATII_KEYSTORE_* env vars or android/keystore.properties. Release build will use debug signing.")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            def releaseSigning = signingConfigs.release
            if (releaseSigning.storeFile != null) {
                signingConfig releaseSigning
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }
}


repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    if (findProject(':capacitor-cordova-android-plugins') != null) {
        implementation project(':capacitor-cordova-android-plugins')
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists() && servicesJSON.text.trim()) {
        def servicesConfig = new groovy.json.JsonSlurper().parse(servicesJSON)
        def expectedPackageName = android.defaultConfig.applicationId
        def packageNames = (servicesConfig.client ?: []).collect {
            it.client_info?.android_client_info?.package_name
        }.findAll { it }

        if (!packageNames.contains(expectedPackageName)) {
            throw new GradleException(
                "google-services.json package_name must include '${expectedPackageName}'. Found: ${packageNames.join(', ')}"
            )
        }

        apply plugin: 'com.google.gms.google-services'
    } else {
        logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
    }
} catch(Exception e) {
    if (e instanceof GradleException) {
        throw e
    }
    throw new GradleException("Invalid google-services.json: ${e.message}", e)
}
