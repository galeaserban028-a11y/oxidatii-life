name: Android Debug APK

# Fast test build. Produces an unsigned debug APK you can sideload on your
# phone to verify native changes (e.g. capacitor.config.ts allowNavigation
# tweaks) without going through Google Play.
#
# How to use:
# 1. GitHub → Actions → "Android Debug APK" → Run workflow.
# 2. When it finishes, open the run → Artifacts → download `app-debug-apk`.
# 3. Transfer the APK to your Android phone and install it
#    (Settings → Allow install from this source, first time only).

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "capacitor.config.ts"
      - "android/**"
      - ".github/workflows/android-debug-apk.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Decode google-services.json (optional)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          python3 - <<'PY'
          import json, pathlib, sys
          path = pathlib.Path('android/app/google-services.json')
          data = json.loads(path.read_text())
          packages = [
              client.get('client_info', {}).get('android_client_info', {}).get('package_name')
              for client in data.get('client', [])
          ]
          if 'com.oxidatii.app' not in packages:
              print(f"::error::google-services.json must contain package_name com.oxidatii.app, found: {packages}")
              sys.exit(1)
          PY

      - name: Build SPA bundle for Android APK
        env:
          BUILD_MODE: spa
          SERVER_FN_BASE_URL: https://oxidatii.life/_serverFn
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          VITE_ANDROID_PUSH_ENABLED: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' && 'true' || 'false' }}
        run: bun run build:spa

      - name: Capacitor sync android (uses dist/spa/)
        env:
          CAP_PLATFORM: android
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
